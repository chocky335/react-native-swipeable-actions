name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      enable-e2e-android:
        description: 'Run Android E2E tests'
        required: false
        type: boolean
        default: false
      enable-e2e-ios:
        description: 'Run iOS E2E tests'
        required: false
        type: boolean
        default: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Install example dependencies
        run: cd example && npm i --ignore-scripts

      - name: Generate example Android project
        run: cd example && npx expo prebuild --platform android --no-install

      - name: Run tests
        run: SKIP_E2E=1 ./scripts/test-all.sh

  e2e-android:
    if: inputs.enable-e2e-android == true
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Install E2E dependencies
        run: cd e2e && npm ci

      - name: Install example dependencies
        run: cd example && npm i --ignore-scripts

      - name: Generate example Android project
        run: cd example && npx expo prebuild --platform android --no-install

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('example/android/**/*.gradle*', 'example/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build release APK
        run: cd example/android && NODE_ENV=production ./gradlew assembleRelease

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Cache AVD snapshot
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api34-default-x86_64-${{ runner.os }}

      - name: Generate AVD snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: default
          arch: x86_64
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: echo "AVD snapshot generated"

      - name: Run E2E tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: default
          arch: x86_64
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            adb logcat -c
            adb logcat > /tmp/logcat.txt &
            LOGCAT_PID=$!
            cd e2e && npm run test:android
            TEST_EXIT=$?
            kill $LOGCAT_PID 2>/dev/null || true
            exit $TEST_EXIT

      - name: Upload logcat
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logcat-android
          path: /tmp/logcat.txt

  e2e-ios:
    if: inputs.enable-e2e-ios == true
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install E2E dependencies
        run: cd e2e && npm ci

      - name: Install example dependencies
        run: cd example && npm i --ignore-scripts

      - name: Generate example iOS project
        run: cd example && npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        run: cd example/ios && pod install

      - name: Build release app
        run: |
          cd example/ios
          xcodebuild \
            -workspace SwipeableDemo.xcworkspace \
            -scheme SwipeableDemo \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath ./build \
            -quiet

      - name: Detect simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          devices = json.load(sys.stdin)['devices']
          for runtime, devs in devices.items():
              if 'iOS' in runtime:
                  for d in devs:
                      if 'iPhone' in d['name'] and d['isAvailable']:
                          print(d['udid'])
                          sys.exit(0)
          sys.exit(1)
          ")
          DEVICE_NAME=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          devices = json.load(sys.stdin)['devices']
          for runtime, devs in devices.items():
              if 'iOS' in runtime:
                  for d in devs:
                      if 'iPhone' in d['name'] and d['isAvailable']:
                          print(d['name'])
                          sys.exit(0)
          sys.exit(1)
          ")
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
          echo "device_name=$DEVICE_NAME" >> "$GITHUB_OUTPUT"
          echo "Detected simulator: $DEVICE_NAME ($UDID)"

      - name: Boot simulator
        run: |
          xcrun simctl boot "${{ steps.sim.outputs.udid }}" || true
          xcrun simctl bootstatus "${{ steps.sim.outputs.udid }}"

      - name: Run E2E tests
        env:
          IOS_DEVICE_NAME: ${{ steps.sim.outputs.device_name }}
          IOS_UDID: ${{ steps.sim.outputs.udid }}
          IOS_APP_PATH: ${{ github.workspace }}/example/ios/build/Build/Products/Release-iphonesimulator/SwipeableDemo.app
        run: cd e2e && npm run test:ios

      - name: Install Maestro
        run: curl -Ls "https://get.maestro.mobile.dev" | bash

      - name: Run Maestro seekbar regression test
        run: |
          export PATH="$PATH:$HOME/.maestro/bin"
          maestro test e2e/maestro/seekbar-regression.yaml

      - name: Upload Appium logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-log-ios
          path: e2e/logs/

      - name: Capture simulator logs
        if: always()
        run: |
          xcrun simctl spawn "${{ steps.sim.outputs.udid }}" log show --last 10m --predicate 'subsystem == "com.swipeabledemo.app"' > /tmp/simulator-log.txt 2>&1 || true

      - name: Upload simulator logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simulator-log-ios
          path: /tmp/simulator-log.txt
