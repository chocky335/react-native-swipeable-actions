name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Install example dependencies
        run: cd example && npm i --ignore-scripts

      - name: Generate example Android project
        run: cd example && npx expo prebuild --platform android --no-install

      - name: Run tests
        run: SKIP_E2E=1 ./scripts/test-all.sh

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        env:
          VERSION_TYPE: ${{ inputs.version }}
        run: |
          if [ "$VERSION_TYPE" = "prerelease" ]; then
            npm version prerelease --preid=canary -m "Pre-release %s"
          else
            npm version "$VERSION_TYPE" -m "Release %s"
          fi

      - name: Build
        run: npm run build

      - name: Publish to npm
        env:
          VERSION_TYPE: ${{ inputs.version }}
        run: |
          if [ "$VERSION_TYPE" = "prerelease" ]; then
            npm publish --tag canary --provenance
          else
            npm publish --provenance
          fi

      - name: Push version commit and tag
        run: git push --follow-tags
